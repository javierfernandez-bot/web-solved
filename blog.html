<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png"/>
<link rel="icon" type="image/png" sizes="512x512" href="assets/favicon.png"/>
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png"/>
<title>Blog · Solved</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap"/>
<!-- El blog real vive en WordPress: que el SEO quede allí, no en este wrapper -->
<meta name="robots" content="noindex,follow"/>
<link rel="canonical" href="https://trysolved.com/blog/"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="stylesheet" href="_ds/solved-design-system-019dd861-f654-7208-a0d9-ce01d38606b8/colors-and-type.css?v=20260623b"/>
<link rel="stylesheet" href="solved.css?v=20260623b"/>
</head>
<body data-screen-label="Blog">

<div id="nav"></div>

<!-- ============ BLOG (WordPress embebido, sin su cabecera ni su footer) ============ -->
<div class="blog-embed">
  <iframe class="blog-frame" src="https://trysolved.com/blog/" title="Blog de Solved"></iframe>
</div>

<!-- El footer único de la web lo inyecta chrome.js aquí -->
<div id="footer"></div>

<!-- Ocultar el footer de WordPress dentro del iframe para que no se duplique.
     Mismo origen en producción (trysolved.com); en desarrollo cross-origin el try/catch lo ignora. -->
<script>
  (function () {
    var frame = document.querySelector('.blog-frame');
    if (!frame) return;
    frame.addEventListener('load', function () {
      try {
        var doc = frame.contentDocument || frame.contentWindow.document;
        var style = doc.createElement('style');
        style.textContent = 'footer, .footer, .footer__strip, .footer__legal { display: none !important; }';
        doc.head.appendChild(style);
      } catch (e) { /* cross-origin en desarrollo: se ignora */ }
    });
  })();
</script>

<script src="chrome.js?v=20260623b"></script>
</body>
</html>
