<!-- El blog real vive en WordPress: que el SEO quede allí, no en este wrapper -->
<meta name="robots" content="noindex,follow"/>
<link rel="canonical" href="https://trysolved.com/blog/"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>

</head>
<body data-screen-label="Blog">

<div id="nav"></div>

<!-- ============ BLOG (WordPress embebido, sin su cabecera ni su footer) ============ -->
<div class="blog-embed">
  <iframe class="blog-frame" src="https://trysolved.com/blog/" title="Blog de Solved"></iframe>
</div>

<!-- El footer único de la web lo inyecta chrome.js aquí -->
<div id="footer"></div>

<!-- Integrar el blog de WordPress: ocultar su footer (no duplicar el nuestro) y
     ajustar el alto del iframe al de su contenido para que NO tenga scroll propio;
     así toda la página comparte un único scroll.
     Mismo origen en producción (trysolved.com); en desarrollo cross-origin el try/catch lo ignora. -->
<script>
  (function () {
    var frame = document.querySelector('.blog-frame');
    var embed = document.querySelector('.blog-embed');
    if (!frame || !embed) return;

    // Recorte de la cabecera de WP (px reales, resueltos desde --blog-crop en CSS).
    function cropPx() { return -parseFloat(getComputedStyle(frame).top) || 0; }

    function fit() {
      try {
        var doc = frame.contentDocument || frame.contentWindow.document;
        var h = Math.max(
          doc.body ? doc.body.scrollHeight : 0,
          doc.documentElement ? doc.documentElement.scrollHeight : 0
        );
        if (!h) return;
        frame.style.height = h + 'px';                 // iframe = alto del contenido → sin scroll interno
        embed.style.height = Math.max(0, h - cropPx()) + 'px'; // contenedor = contenido menos la cabecera recortada
      } catch (e) { /* cross-origin en desarrollo: se ignora */ }
    }

    frame.addEventListener('load', function () {
      try {
        var doc = frame.contentDocument || frame.contentWindow.document;
        var style = doc.createElement('style');
        // Ocultar footer de WP y bloquear su scroll interno por si acaso.
        style.textContent = 'footer, .footer, .footer__strip, .footer__legal { display: none !important; }'
                          + 'html, body { overflow: hidden !important; }';
        doc.head.appendChild(style);
      } catch (e) { /* cross-origin en desarrollo: se ignora */ }
      fit();
      // Re-medir cuando acaben de cargar fuentes/imágenes y cambien la altura.
      setTimeout(fit, 400);
      setTimeout(fit, 1500);
    });

    window.addEventListener('resize', fit);
  })();
</script>

<script src="chrome.js?v=20260623b"></script>
</body>
</html>
