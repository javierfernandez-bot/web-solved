<title>Página no encontrada (404) · Solved</title>
<script>
/* Rescate de URLs de artículos sin el prefijo /blog/ (enlaces externos/antiguos):
   /{slug-con-guiones}/ → /blog/{slug}/. Guarda anti-bucle: no actúa dentro de /blog/. */
(function () {
  var p = location.pathname;
  if (p.indexOf('/blog/') === 0) return;
  var seg = p.replace(/^\/+|\/+$/g, '').split('/');
  if (seg.length === 1 && /-/.test(seg[0]) && !/\.[a-z0-9]+$/i.test(seg[0])) {
    location.replace('/blog/' + seg[0] + '/' + location.hash);
  }
})();
</script>
