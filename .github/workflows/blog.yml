# =========================================================
# Fase 2 (opcional) — Regenera el blog desde WordPress y commitea los cambios.
#
# Se ejecuta SOLO cuando tú quieras:
#   - manualmente desde la pestaña "Actions" → "Run workflow"
#   - automáticamente cada día (cron) por si publicaste algo en WP
#
# No despliega por su cuenta nada raro: hace push a main, y GitHub Pages publica
# como con cualquier otro commit. Para activarlo, basta con que este archivo esté
# en main; para "apagarlo", comenta el bloque `schedule`.
# =========================================================
name: Rebuild blog

on:
  workflow_dispatch: {}          # botón manual en la pestaña Actions (siempre disponible)
  schedule:
    # Cada día a las 08:00 hora de España (verano CEST = 06:00 UTC). Recoge el
    # post que el publicador diario de Make dejó publicado la tarde anterior
    # (~17:27 UTC). Nota: el cron es fijo en UTC, así que en invierno cae a las 07:00.
    - cron: '0 6 * * *'

permissions:
  contents: write                # para commitear el /blog regenerado

concurrency:
  group: rebuild-blog
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Generar el blog
        run: npm run build:blog
        env:
          # WordPress (CMS/API) vive en trysolved.es; el sitio estático es trysolved.com.
          WP_API_BASE: https://trysolved.es/wp-json/wp/v2

      - name: Commit si hay cambios
        run: |
          git config user.name  "blog-bot"
          git config user.email "blog-bot@users.noreply.github.com"
          git add blog sitemap.xml
          if git diff --cached --quiet; then
            echo "Sin cambios en el blog."
          else
            git commit -m "blog: regeneración automática desde WordPress"
            git push
          fi
